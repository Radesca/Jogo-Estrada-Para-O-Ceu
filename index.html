<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Estrada para o Céu: Carlo Acutis Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="start" class="screen cover">
    <button id="play" class="btn playCorner">JOGAR &#9654;</button>
  </div>

  <div id="over" class="screen hidden">
  <div class="panel">
    <h1>FIM DA JORNADA</h1>
    <h2 id="finalScore">PONTOS: 0</h2>
    <p id="finalMsg">"Todos nascem como originais, mas muitos morrem como cópias." &mdash; Bem-aventurado Carlo Acutis</p>
    <button id="retry" class="btn">VOLTAR AO MENU</button>
  </div>
</div>

<div id="mobileBtns">
  <button id="jumpBtn" class="arrowBtn" aria-label="Pular"><svg viewBox="0 0 16 16" width="40" height="40" shape-rendering="crispEdges" aria-hidden="true"><g fill="#3a2600"><rect x="7" y="2" width="2" height="2"/><rect x="6" y="4" width="4" height="2"/><rect x="5" y="6" width="6" height="2"/><rect x="4" y="8" width="8" height="2"/><rect x="3" y="10" width="10" height="2"/><rect x="6" y="10" width="4" height="4"/></g></svg></button>
  <button id="duckBtn" class="arrowBtn" aria-label="Abaixar"><svg viewBox="0 0 16 16" width="40" height="40" shape-rendering="crispEdges" aria-hidden="true"><g fill="#3a2600"><rect x="6" y="2" width="4" height="4"/><rect x="3" y="4" width="10" height="2"/><rect x="4" y="6" width="8" height="2"/><rect x="5" y="8" width="6" height="2"/><rect x="6" y="10" width="4" height="2"/><rect x="7" y="12" width="2" height="2"/></g></svg></button>
</div>
<script src="game.js"></script>
</body>
</html>
